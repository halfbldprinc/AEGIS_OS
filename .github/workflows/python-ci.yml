name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PYTHONDONTWRITEBYTECODE: "1"
  FORCE_COLOR: "1"

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: |
            pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff pytest httpx psutil
          pip install -e .

      - name: Dependency health check
        run: python -m pip check

      - name: Placeholder guard
        run: bash scripts/no_placeholder_guard.sh

      - name: Integrated service lifecycle guard
        run: bash scripts/assert_integrated_service_enable_start.sh

      - name: Syntax compilation
        run: python -m compileall -q aegis

      - name: Lint
        run: ruff check .

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    needs: quality
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.14"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest httpx psutil
          pip install -e .

      - name: Run tests
        run: python -m pytest -q --junitxml=pytest-${{ matrix.python-version }}.xml

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-report-${{ matrix.python-version }}
          path: pytest-${{ matrix.python-version }}.xml
          if-no-files-found: error
          retention-days: 14
