repos:
  - repo: https://github.com/pycqa/ruff-pre-commit
    rev: v0.1.0
    hooks:
      - id: ruff
        args: ["check", "."]
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
