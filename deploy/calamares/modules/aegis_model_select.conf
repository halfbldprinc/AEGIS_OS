# Calamares shellprocess module: installer-stage model and permission selection.
# Place this file in Calamares modules and register in settings.conf sequence.

type: shellprocess
id: aegis_model_select
name: AegisOS model selection
script:
  - /bin/bash
  - -lc
  - /opt/aegisos/scripts/installer_select_model.sh /tmp/calamares-root /tmp/calamares-root/etc/aegis/install-selections.env
